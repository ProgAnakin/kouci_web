<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#131512" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Title, description, Open Graph, Twitter and JSON-LD are injected per page
         at build time by the Seo component (src/components/Seo.tsx). No title tag
         lives here on purpose, so the generated one is never duplicated.
         Fonts (Inter + Sora) are self-hosted via @fontsource, bundled in
         src/main.tsx — no external request, no flash of unstyled text. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
